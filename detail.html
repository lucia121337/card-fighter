<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>카드 상세 — 카드 파이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  @import url('https://cdn.jsdelivr.net/gh/webfontworld/gmarket/GmarketSans.css');
  :root{
    --bg:#f5f7fa; --panel:#ffffff; --panel2:#e8f0fd; --line:#e2e8f0;
    --txt:#1e293b; --muted:#64748b; --brand:#145CE6; --brand-deep:#0E47C0;
    --shadow:0 4px 18px rgba(20,92,230,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:"GmarketSans","Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.93);
         backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
         padding:12px 24px;display:flex;align-items:center;gap:14px}
  .back{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:#fff;
        background:var(--brand);font-weight:700;font-size:13px;padding:8px 16px;border-radius:10px;
        box-shadow:0 2px 8px rgba(20,92,230,.28);transition:.15s background;white-space:nowrap}
  .back:hover{background:var(--brand-deep)}
  .header-logo{width:34px;height:34px;flex-shrink:0}
  .header-title{font-weight:800;color:var(--txt);font-size:16px;letter-spacing:-.5px}
  .wrap{max-width:820px;margin:0 auto;padding:28px 16px 80px}
  .hero{background:var(--panel);border:1.5px solid var(--line);
        border-radius:22px;padding:32px 28px;display:flex;gap:26px;align-items:center;
        box-shadow:var(--shadow)}
  .hero img{width:156px;height:100px;object-fit:contain;border-radius:12px;
            background:var(--bg);padding:10px;border:1px solid var(--line);flex-shrink:0}
  .hero .h-name{font-size:22px;font-weight:800;color:var(--txt);line-height:1.35}
  .hero .h-corp{font-size:13.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .hero .h-tags{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
  .hero .h-tags span{background:var(--panel2);color:var(--brand);border:1px solid #bfdbfe;border-radius:8px;
             padding:4px 12px;font-size:12px;font-weight:700}
  .summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:20px}
  .sum-card{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;
        padding:18px 20px;box-shadow:var(--shadow)}
  .sum-card .lab{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:8px;letter-spacing:.05em}
  .sum-card .val{font-size:15px;color:var(--txt);line-height:1.6;font-weight:700}
  .sum-card .val.accent{color:var(--brand)}
  .sec-box{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;
       padding:22px;margin-top:18px;box-shadow:var(--shadow)}
  .sec-box h3{font-size:15px;font-weight:800;color:var(--txt);margin:0 0 16px;
        padding-bottom:12px;border-bottom:2px solid var(--brand);display:flex;align-items:center;gap:8px}
  .kb-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .kb-tab{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;
        font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);
        background:var(--panel);color:var(--muted);transition:.14s all;font-family:inherit}
  .kb-tab:hover{border-color:var(--brand);color:var(--brand)}
  .kb-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .kb-tab img{width:18px;height:18px;object-fit:contain;border-radius:4px}
  .kb-panel{display:none}
  .kb-panel.active{display:block}
  .binfo{font-size:14px;line-height:1.85;color:#475569}
  .binfo p{margin:8px 0}
  .binfo strong{color:var(--txt);font-weight:700}
  .binfo table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
  .binfo th,.binfo td{border:1px solid var(--line);padding:9px 12px;text-align:center}
  .binfo th,.binfo .b-table-top{background:var(--panel2);font-weight:700;color:var(--txt)}
  .binfo img{max-width:100%;height:auto;border-radius:8px}
  .binfo ul{padding-left:20px;margin:8px 0}
  .binfo li{margin:5px 0}
  .cat-wrap{display:flex;flex-wrap:wrap;gap:8px}
  .cat-chip{background:var(--panel2);color:var(--brand);border:1px solid #bfdbfe;
        border-radius:8px;padding:5px 12px;font-size:12.5px;font-weight:600}
  .ext-link{display:inline-flex;align-items:center;gap:6px;text-decoration:none;
        color:var(--brand);font-size:13px;font-weight:700;margin-top:18px;
        padding:10px 18px;border:1.5px solid var(--brand);border-radius:10px;transition:.15s background}
  .ext-link:hover{background:var(--panel2)}
  .disclaimer{margin-top:22px;padding:18px 20px;background:var(--panel2);
        border:1.5px solid var(--line);border-radius:14px;font-size:12px;
        line-height:1.9;color:var(--muted)}
  .disclaimer .d-head{color:var(--brand);font-weight:800;margin-bottom:6px;font-size:12.5px}
  .status{padding:80px 0;text-align:center;color:var(--muted);font-size:15px;line-height:2}
  .status a{color:var(--brand);font-weight:700;text-decoration:none}
  .spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--brand);
        border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 비교함 버튼 */
  .compare-hero-btn{background:var(--brand);border:none;color:#fff;
        border-radius:10px;padding:9px 0;font-size:13px;font-weight:700;cursor:pointer;
        font-family:inherit;transition:.15s background;width:156px;text-align:center;
        box-shadow:0 2px 8px rgba(20,92,230,.3)}
  .compare-hero-btn:hover{background:var(--brand-deep)}
  .compare-hero-btn.selected{background:#10b981}

  /* 혜택 계산기 */
  .calc-box{background:var(--panel);border:1.5px solid var(--line);border-radius:16px;
        padding:22px;margin-top:18px;box-shadow:var(--shadow)}
  .calc-box h3{font-size:15px;font-weight:800;color:var(--txt);margin:0 0 16px;
        padding-bottom:12px;border-bottom:2px solid var(--brand);display:flex;align-items:center;gap:8px}
  .calc-row{display:flex;align-items:center;gap:12px;padding:12px 0;
        border-bottom:1px solid var(--line)}
  .calc-row:last-of-type{border-bottom:none}
  .calc-toggle{position:relative;width:44px;height:24px;flex-shrink:0}
  .calc-toggle input{opacity:0;width:0;height:0}
  .calc-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:999px;
        cursor:pointer;transition:.2s}
  .calc-slider::before{content:'';position:absolute;width:18px;height:18px;
        background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;
        box-shadow:0 1px 4px rgba(0,0,0,.2)}
  .calc-toggle input:checked+.calc-slider{background:var(--brand)}
  .calc-toggle input:checked+.calc-slider::before{transform:translateX(20px)}
  .calc-name{flex:1;font-size:14px;font-weight:600;color:var(--txt)}
  .calc-amount{font-size:14px;font-weight:800;color:var(--brand);flex-shrink:0;min-width:80px;text-align:right}
  .calc-amount.zero{color:var(--muted);font-weight:600}
  .calc-total{display:flex;justify-content:space-between;align-items:center;
        margin-top:16px;padding:16px 18px;background:var(--panel2);border-radius:12px}
  .calc-total .tot-label{font-size:14px;font-weight:700;color:var(--txt)}
  .calc-total .tot-amt{font-size:20px;font-weight:800;color:var(--brand)}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← 목록으로</a>
  <svg class="header-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="42" height="42" rx="13" fill="#145CE6"/>
    <g stroke="#aac4ff" stroke-width="2" stroke-linejoin="round">
      <rect x="10.5" y="13" width="15" height="21" rx="3" fill="#ffffff" transform="rotate(-17 24 24)"/>
      <rect x="22.5" y="13" width="15" height="21" rx="3" fill="#dce8ff" transform="rotate(17 24 24)"/>
    </g>
    <path d="M26.4 15.5 L20 25.2 h4.3 L22 33 L31 22.3 h-4.6 z"
          fill="#ffffff" stroke="#aac4ff" stroke-width="1" stroke-linejoin="round"/>
  </svg>
  <span class="header-title">카드 파이터</span>
</header>

<div class="wrap" id="wrap">
  <div class="status"><div class="spinner"></div>카드 정보를 불러오는 중…</div>
</div>

<script>
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won = n => n ? Number(n).toLocaleString()+'원' : '없음';

/* ── 비교함 (localStorage) ── */
function getCompareList(){ return JSON.parse(localStorage.getItem('compareList')||'[]'); }
function saveCompareList(list){ localStorage.setItem('compareList', JSON.stringify(list)); }

function toggleCompareDetail(idx, name, img){
  let list = getCompareList();
  const i = list.findIndex(c=>String(c.idx)===String(idx));
  if(i > -1){
    list.splice(i,1);
  } else {
    if(list.length >= 3){ alert('최대 3개까지 비교할 수 있어요!'); return; }
    list.push({idx, name, img});
  }
  saveCompareList(list);
  updateCompareBtn(idx);
}

function updateCompareBtn(idx){
  const list = getCompareList();
  const btn = document.getElementById('detail-compare-btn');
  if(!btn) return;
  const added = list.some(c=>String(c.idx)===String(idx));
  btn.textContent = added ? '✓ 비교함에 담겼어요' : '+ 비교함 담기';
  btn.classList.toggle('selected', added);
}

/* ── 혜택 계산기 ── */
function extractAmount(html){
  const text = html.replace(/<[^>]+>/g,' ').replace(/&[^;]+;/g,' ').replace(/\s+/g,' ');
  let max = 0;

  // 1순위: 한도 N만원
  const p1 = /한도\s+(\d+(?:\.\d+)?)\s*만원/g;
  let m;
  while((m=p1.exec(text))!==null){
    const v = parseFloat(m[1])*10000;
    if(v>max && v<=5000000) max=v;
  }

  // 2순위: 한도 N,NNN원
  const p2 = /한도\s+([\d,]+)\s*원/g;
  while((m=p2.exec(text))!==null){
    const v = parseInt(m[1].replace(/,/g,''));
    if(v>max && v<=5000000) max=v;
  }

  // 3순위: 최대 N만원
  if(!max){
    const p3 = /최대\s+(\d+(?:\.\d+)?)\s*만원/g;
    while((m=p3.exec(text))!==null){
      const v = parseFloat(m[1])*10000;
      if(v>max && v<=5000000) max=v;
    }
  }

  // 4순위: N만원 중 가장 큰 값
  if(!max){
    const p4 = /(\d+(?:\.\d+)?)\s*만원/g;
    while((m=p4.exec(text))!==null){
      const v = parseFloat(m[1])*10000;
      if(v>max && v<=5000000) max=v;
    }
  }

  return max;
}

function buildCalc(kb){
  const EXCLUDE = ['유의사항','주의사항','안내','참고','발급','약관','유의'];
  const items = kb
    .filter(b=>!EXCLUDE.some(k=>(b.title||'').includes(k)))
    .map((b,i)=>({
      id:i, title:b.title||'혜택 '+(i+1),
      amount: extractAmount(b.info||''),
      checked:true
    }));

  function renderTotal(){
    const total = items.filter(it=>it.checked).reduce((s,it)=>s+it.amount,0);
    document.getElementById('calc-total-amt').textContent =
      total ? '최대 '+total.toLocaleString()+'원' : '-';
  }

  const rows = items.map(it=>`
    <div class="calc-row">
      <label class="calc-toggle">
        <input type="checkbox" id="calc-${it.id}" checked onchange="
          document.getElementById('calc-${it.id}').closest('.calc-row');
          window._calcItems[${it.id}].checked=this.checked;
          window._calcRender();">
        <span class="calc-slider"></span>
      </label>
      <span class="calc-name">${esc(it.title)}</span>
      <span class="calc-amount${!it.amount?' zero':''}">${it.amount?'최대 '+it.amount.toLocaleString()+'원':'확인 필요'}</span>
    </div>`).join('');

  window._calcItems = items;
  window._calcRender = renderTotal;

  return `<div class="calc-box">
    <h3>🧮 혜택 계산기</h3>
    ${rows}
    <div class="calc-total">
      <span class="tot-label">예상 혜택 합계</span>
      <span class="tot-amt" id="calc-total-amt"></span>
    </div>
  </div>`;
}


function switchTab(i){
  document.querySelectorAll('.kb-tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.kb-panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}

function render(d){
  const name = d.card_name || d.name || '카드';
  const corp = d.company || (d.corp&&d.corp.name) || '';
  const img  = d.card_img || (d.card_img_obj&&d.card_img_obj.url) || '';
  const tags = [];
  if(d.brands) tags.push(d.brands);
  if(d.only_online) tags.push('온라인전용');
  if(d.cate==='CRD') tags.push('신용카드');
  else if(d.cate==='CHK') tags.push('체크카드');

  const kb = d.key_benefit || [];
  let benefitHTML = '';
  if(kb.length){
    const tabs = kb.map((b,i)=>{
      const icon = b.logo_url ? `<img src="${esc(b.logo_url)}" alt="">` : '';
      return `<button class="kb-tab${i===0?' active':''}" onclick="switchTab(${i})">${icon}${esc(b.title||'혜택')}</button>`;
    }).join('');
    const panels = kb.map((b,i)=>`
      <div class="kb-panel${i===0?' active':''}" id="kbp-${i}">
        <div class="binfo">${b.info||'<p style="color:#94a3b8">내용 없음</p>'}</div>
      </div>`).join('');
    benefitHTML = `<div class="kb-tabs">${tabs}</div>${panels}`;
  } else {
    benefitHTML = '<p style="color:#94a3b8;padding:8px 0">혜택 정보가 없습니다.</p>';
  }

  const cats = (d.benefit_categories||'').split(',').map(s=>s.trim()).filter(Boolean);
  const rawFee = d.annual_fee || d.annual_fee_detail || d.annual_fee_basic || '-';
  const fee = rawFee
    .replace(/\[([\d,]+)\]원/g, '$1원')
    .replace(/\s*\/\s*/g, '\n')
    .split('\n').map(s=>s.trim()).filter(Boolean).join('<br>');
  const pre  = d.pre_month_money ? Math.round(d.pre_month_money/10000)+'만원 이상' : '없음';

  document.title = name + ' — 카드 파이터';
  const inCompare = getCompareList().some(c=>String(c.idx)===String(d.idx));

  document.getElementById('wrap').innerHTML = `
    <div class="hero">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0">
        <img src="${esc(img)}" alt="" onerror="this.style.visibility='hidden'"/>
        <button id="detail-compare-btn" class="compare-hero-btn${inCompare?' selected':''}"
          onclick="toggleCompareDetail(${d.idx},'${esc(name)}','${esc(img)}')">
          ${inCompare?'✓ 비교함에 담겼어요':'+ 비교함 담기'}
        </button>
      </div>
      <div>
        <div class="h-name">${esc(name)}</div>
        <div class="h-corp">${esc(corp)}</div>
        <div class="h-tags">${tags.map(t=>`<span>${esc(t)}</span>`).join('')}</div>
      </div>
    </div>
    <div class="summary">
      <div class="sum-card"><div class="lab">연회비</div><div class="val">${fee}</div></div>
      <div class="sum-card"><div class="lab">전월실적 조건</div><div class="val accent">${esc(pre)}</div></div>
      ${d.release_dt?`<div class="sum-card"><div class="lab">출시일</div><div class="val">${esc(d.release_dt)}</div></div>`:''}
    </div>
    ${kb.length ? buildCalc(kb) : ''}
    <div class="sec-box">
      <h3>💡 상세 혜택</h3>
      ${benefitHTML}
    </div>

    ${cats.length?`<div class="sec-box"><h3>🏷️ 혜택 카테고리</h3>
      <div class="cat-wrap">${cats.map(c=>`<span class="cat-chip">${esc(c)}</span>`).join('')}</div>
    </div>`:''}
    <div class="disclaimer">
      <div class="d-head">※ 본 게시물은 카드파이터에서 대가관계 없이 자체제작한 게시물입니다</div>
      * 본 카드의 서비스 내용은 카드사 사정에 따라 사전 고지 후 변경 또는 중단될 수 있습니다.<br>
      * 카드 사용 전 반드시 상품설명서와 약관을 읽어 보시기 바랍니다.
    </div>`;
}

const idx = new URLSearchParams(location.search).get('idx');
if(!idx){
  document.getElementById('wrap').innerHTML =
    '<div class="status">잘못된 접근입니다.<br><a href="index.html">← 목록으로</a></div>';
} else {
  fetch('card_detail/' + idx + '.json')
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(d=>{ render(d); if(window._calcRender) window._calcRender(); })
    .catch(e => {
      document.getElementById('wrap').innerHTML =
        `<div class="status">카드 정보를 불러오지 못했습니다.<br>
        <small style="color:#94a3b8">${esc(String(e))}</small><br><br>
        <a href="index.html">← 목록으로</a></div>`;
    });
}
</script>
</body>
</html>
